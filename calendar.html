<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <title>GEAR HUB — School Calendar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>:root{--bg-primary:#020617;--text-primary:#F8FAFC}body{background:var(--bg-primary);color:var(--text-primary);font-family:Inter,sans-serif}</style>
</head>
<body>
  <div class="min-h-screen p-8">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-3xl font-bold text-white">School Calendar</h2>
      <button class="px-4 py-2 bg-blue-600 rounded-xl text-white font-bold text-sm">+ Add Event</button>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div class="lg:col-span-2 rounded-[2rem] border border-white/10 p-6">
        <div class="flex items-center justify-between mb-6">
          <h3 class="font-bold text-white text-lg">December 2025</h3>
          <div class="flex gap-2"><button class="text-slate-400 hover:text-white">&lt;</button><button class="text-slate-400 hover:text-white">&gt;</button></div>
        </div>
        <div class="grid grid-cols-7 gap-2 text-center text-sm">
          <div class="text-slate-500 font-bold py-2">Sun</div><div class="text-slate-500 font-bold py-2">Mon</div><div class="text-slate-500 font-bold py-2">Tue</div><div class="text-slate-500 font-bold py-2">Wed</div><div class="text-slate-500 font-bold py-2">Thu</div><div class="text-slate-500 font-bold py-2">Fri</div><div class="text-slate-500 font-bold py-2">Sat</div>
          <!-- Simple days demo -->
          <!-- You can add 1..31 cells -->
          <div class="h-24 border border-white/5 rounded-lg p-2 text-left"><span class="text-xs font-bold text-slate-400">1</span></div>
        </div>
      </div>
      <div class="space-y-4">
        <h3 class="font-bold text-white text-lg px-2">Upcoming Events</h3>
        <div class="text-center text-slate-500 py-10 bg-white/5 rounded-xl">No upcoming events.</div>
      </div>
    </div>
  </div>
</body>
</html>
