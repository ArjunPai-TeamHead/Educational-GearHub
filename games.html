<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <title>GEAR HUB — Arcade Zone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>:root{--bg-primary:#020617;--text-primary:#F8FAFC}body{background:var(--bg-primary);color:var(--text-primary);font-family:Inter,sans-serif}</style>
</head>
<body>
  <div class="min-h-screen p-8">
    <div class="flex justify-between items-center">
      <div>
        <h2 class="text-4xl font-bold text-white flex items-center gap-3 tracking-tight">🎮 Arcade Zone</h2>
        <p class="text-slate-400 mt-1">Play, Learn, Earn XP.</p>
      </div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 pb-10 mt-8">
      <div class="relative group transition-all text-center py-8 flex flex-col items-center justify-between min-h-[260px] rounded-[2rem] border border-white/10 bg-[#1E293B]/60">
        <div class="text-2xl">👻</div>
        <h3 class="text-lg font-bold text-white mb-1">Sky Hop</h3>
        <p class="text-slate-400 text-xs px-2">Fly & learn with flashcards!</p>
        <button class="w-full max-w-[200px] mx-auto mt-4 py-2 bg-white/10 text-white rounded-lg text-xs">Play</button>
      </div>
      <div class="relative group transition-all text-center py-8 flex flex-col items-center justify-between min-h-[260px] rounded-[2rem] border border-white/10 bg-[#1E293B]/60">
        <div class="text-2xl">➗</div>
        <h3 class="text-lg font-bold text-white mb-1">Math Sprint</h3>
        <p class="text-slate-400 text-xs px-2">Solve equations fast!</p>
        <button class="w-full max-w-[200px] mx-auto mt-4 py-2 bg-white/10 text-white rounded-lg text-xs">Play</button>
      </div>
    </div>
  </div>
</body>
</html>
