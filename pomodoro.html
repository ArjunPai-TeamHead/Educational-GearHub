<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <title>GEAR HUB — Focus Timer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>:root{--bg-primary:#020617;--text-primary:#F8FAFC}body{background:var(--bg-primary);color:var(--text-primary);font-family:Inter,sans-serif}</style>
</head>
<body>
  <div class="h-screen flex flex-col items-center justify-center">
    <div class="relative w-96 h-96 flex items-center justify-center">
      <svg class="w-full h-full transform -rotate-90">
        <circle cx="192" cy="192" r="170" stroke="rgba(255,255,255,0.05)" stroke-width="8" fill="transparent"></circle>
        <circle cx="192" cy="192" r="170" stroke="#06b6d4" stroke-width="8" fill="transparent" stroke-dasharray="1068" stroke-dashoffset="200" stroke-linecap="round"></circle>
      </svg>
      <div class="absolute inset-0 flex flex-col items-center justify-center">
        <h2 class="text-8xl font-bold text-white font-mono tracking-tighter mb-4">25:00</h2>
        <div class="flex items-center gap-2 mb-10">
          <span class="text-cyan-400">⚡</span>
          <span class="text-lg font-bold tracking-wide uppercase text-cyan-400">Focus</span>
        </div>
        <div class="flex gap-6">
          <button class="w-20 h-20 rounded-full flex items-center justify-center text-white bg-cyan-500">▶</button>
          <button class="w-20 h-20 rounded-full flex items-center justify-center bg-[#0F172A] text-slate-400 border border-white/10">↻</button>
        </div>
      </div>
    </div>
    <div class="mt-12 flex items-center gap-2 p-2 rounded-2xl bg-[#0F172A]/80">
      <button class="px-8 py-3 rounded-xl text-sm font-bold bg-white/10 text-white">Focus</button>
      <button class="px-8 py-3 rounded-xl text-sm font-bold text-slate-500 hover:text-slate-300">Short Break</button>
      <button class="px-8 py-3 rounded-xl text-sm font-bold text-slate-500 hover:text-slate-300">Long Break</button>
    </div>
  </div>
</body>
</html>
