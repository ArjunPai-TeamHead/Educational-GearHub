<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <title>GEAR HUB — Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>:root{--bg-primary:#0F172A;--text-primary:#F8FAFC}body{background:var(--bg-primary);color:var(--text-primary);font-family:Inter,sans-serif}</style>
</head>
<body>
  <div class="min-h-screen flex items-center justify-center relative overflow-hidden">
    <div class="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] bg-cyan-600/10 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] bg-blue-600/10 rounded-full blur-[120px]"></div>
    <div class="w-full max-w-md p-8 mx-4 rounded-3xl bg-[#1E293B]/60 border border-white/10 backdrop-blur-3xl">
      <div class="flex flex-col items-center text-center mb-8">
        <div class="w-20 h-20 mb-6 bg-gradient-to-tr from-cyan-400 to-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-cyan-500/20">
          <span class="text-2xl font-bold text-white">GH</span>
        </div>
        <h1 class="text-3xl font-bold text-white mb-2 tracking-tight">GEAR HUB</h1>
        <p class="text-slate-400 text-sm">Unified Educational Platform</p>
      </div>
      <div class="flex bg-slate-900/50 p-1 rounded-xl mb-6 border border-white/5">
        <button class="flex-1 py-2 text-sm font-medium rounded-lg bg-white/10 text-white shadow">Sign In</button>
        <button class="flex-1 py-2 text-sm font-medium rounded-lg text-slate-400">Sign Up</button>
      </div>
      <form class="space-y-4">
        <div>
          <label class="text-xs font-semibold text-slate-400 ml-1 uppercase tracking-wider">Institutional Email</label>
          <div class="relative">
            <input name="email" type="email" placeholder="name.12345@gear.ac.in" class="w-full bg-slate-900/50 border border-white/10 rounded-xl pl-4 pr-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-cyan-500/50" />
          </div>
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-400 ml-1 uppercase tracking-wider">Password</label>
          <div class="relative">
            <input name="password" type="password" placeholder="••••••••" class="w-full bg-slate-900/50 border border-white/10 rounded-xl pl-4 pr-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-cyan-500/50" />
          </div>
        </div>
        <button type="button" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-cyan-900/20">Sign In</button>
      </form>
      <div class="relative py-6">
        <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-white/10"></span></div>
        <div class="relative flex justify-center text-xs uppercase"><span class="bg-[#1E293B] px-2 text-slate-500">Or continue with</span></div>
      </div>
      <button type="button" class="w-full bg-white text-slate-900 font-semibold py-3 rounded-xl flex items-center justify-center gap-3">Google</button>
    </div>
  </div>
</body>
</html>
