<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <title>GEAR HUB — Homework</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>:root{--bg-primary:#020617;--text-primary:#F8FAFC}body{background:var(--bg-primary);color:var(--text-primary);font-family:Inter,sans-serif}</style>
</head>
<body>
  <div class="min-h-screen p-8">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-3xl font-bold text-white">Assignments</h2>
      <button class="px-4 py-2 bg-cyan-600 rounded-xl text-white font-bold text-sm">Create New</button>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div class="rounded-[2rem] border border-white/10 p-6 group hover:border-cyan-500/30">
        <div class="flex justify-between items-start mb-4">
          <div class="p-3 bg-blue-500/10 rounded-xl text-blue-300">📄</div>
          <span class="text-xs font-bold text-orange-400 bg-orange-500/10 px-2 py-1 rounded border border-orange-500/20">Due 2025-12-31</span>
        </div>
        <h3 class="text-lg font-bold text-white mb-2">Sample Assignment</h3>
        <p class="text-slate-400 text-sm mb-6">Description of the assignment.</p>
        <button class="w-full py-2 bg-white/5 border border-white/10 rounded-lg text-slate-300">Submit Work</button>
      </div>
      <div class="col-span-full py-20 text-center text-slate-500 bg-white/5 rounded-3xl border border-white/5 border-dashed">No active assignments.</div>
    </div>
  </div>
</body>
</html>
