<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <title>GEAR HUB — iMeet Live</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>:root{--bg-primary:#020617;--text-primary:#F8FAFC}body{background:var(--bg-primary);color:var(--text-primary);font-family:Inter,sans-serif}</style>
</head>
<body>
  <div class="min-h-screen flex items-center justify-center p-8">
    <div class="max-w-2xl w-full space-y-8">
      <div class="text-center space-y-4">
        <div class="w-24 h-24 bg-gradient-to-tr from-cyan-500 to-blue-600 rounded-3xl mx-auto flex items-center justify-center">
          <span class="text-white text-3xl">🎥</span>
        </div>
        <h2 class="text-4xl font-bold text-white">iMeet Live Class</h2>
        <p class="text-slate-400 text-lg">Secure, high-quality video conferencing.</p>
      </div>
      <div class="rounded-3xl border border-white/10 p-8 bg-[#1E293B]/60">
        <label class="text-sm font-bold text-slate-300 uppercase tracking-wider mb-2 block">Room Name</label>
        <div class="flex gap-3 mb-6">
          <input value="GEARHUB-CLASSROOM-1" class="flex-1 bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 text-white font-mono tracking-wide" />
          <button class="p-3 bg-white/5 border border-white/10 rounded-xl text-slate-400">Copy</button>
        </div>
        <button class="w-full py-4 bg-gradient-to-r from-cyan-600 to-blue-600 text-white font-bold rounded-xl">Join Session</button>
      </div>
      <div class="flex justify-center gap-8 text-slate-500 text-sm font-medium">
        <span class="flex items-center gap-2">🛡️ End-to-End Encrypted</span>
      </div>
    </div>
  </div>
</body>
</html>
