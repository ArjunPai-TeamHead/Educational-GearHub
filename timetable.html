<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <title>GEAR HUB — Timetable</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>:root{--bg-primary:#020617;--text-primary:#F8FAFC}body{background:var(--bg-primary);color:var(--text-primary);font-family:Inter,sans-serif}</style>
</head>
<body>
  <div class="flex h-screen overflow-hidden bg-[#020617] text-slate-100 font-sans">
    <!-- Sidebar same; timetable active -->
    <aside class="w-72 flex flex-col bg-[#0F172A]/40 backdrop-blur-3xl border-r border-white/5 flex-shrink-0 z-20">
      <div class="p-8 flex items-center gap-4">
        <div class="w-10 h-10 relative"><div class="absolute inset-0 bg-cyan-500 rounded-xl blur opacity-20"></div><div class="relative w-full h-full bg-gradient-to-tr from-cyan-500 to-blue-600 rounded-xl flex items-center justify-center border border-white/10"><svg class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M7 3l10 0 5 9-5 9H7L2 12z"/></svg></div></div>
        <div><h1 class="text-xl font-bold text-white">GEAR HUB</h1><p class="text-[10px] text-cyan-400 uppercase font-bold opacity-80">Student Edition</p></div>
      </div>
      <nav class="flex-1 px-4 py-4 space-y-1">
        <a href="dashboard.html" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl text-slate-400 hover:bg-white/5 hover:text-slate-200"><svg class="w-5 h-5 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 13h8V3H3zM13 21h8v-8h-8z"/></svg><span class="text-sm">Dashboard</span></a>
        <a href="notes.html" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl text-slate-400 hover:bg-white/5 hover:text-slate-200"><svg class="w-5 h-5 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 19.5A2.5 2.5 0 006.5 22h11a2.5 2.5 0 002.5-2.5V6"/><path d="M4 19V6a2 2 0 012-2h12"/></svg><span class="text-sm">Study & Notes</span></a>
        <a href="homework.html" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl text-slate-400 hover:bg-white/5 hover:text-slate-200"><svg class="w-5 h-5 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 12h6M9 16h6"/><path d="M4 6h16v14H4z"/></svg><span class="text-sm">Homework</span></a>
        <a href="timetable.html" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl bg-gradient-to-r from-cyan-500/10 to-blue-500/10 text-white border border-cyan-500/10 relative overflow-hidden">
          <div class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-8 bg-cyan-400 rounded-r-full"></div>
          <svg class="w-5 h-5 text-cyan-400" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 2v4M18 2v4M3 10h18"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01M16 18h.01"/></svg>
          <span class="text-sm">Timetable</span>
        </a>
        <a href="imeet.html" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl text-slate-400 hover:bg-white/5 hover:text-slate-200"><svg class="w-5 h-5 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg><span class="text-sm">iMeet Live</span></a>
        <a href="pomodoro.html" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl text-slate-400 hover:bg-white/5 hover:text-slate-200"><svg class="w-5 h-5 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span class="text-sm">Focus Timer</span></a>
        <a href="games.html" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl text-slate-400 hover:bg-white/5 hover:text-slate-200"><svg class="w-5 h-5 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="6" width="8" height="12" rx="2"/><rect x="14" y="6" width="8" height="12" rx="2"/></svg><span class="text-sm">Arcade Zone</span></a>
        <a href="chat.html" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl text-slate-400 hover:bg-white/5 hover:text-slate-200"><svg class="w-5 h-5 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a4 4 0 00-4-4H7l-4 4V5a4 4 0 014-4h10a4 4 0 014 4z"/></svg><span class="text-sm">Collaboration</span></a>
        <a href="grades.html" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl text-slate-400 hover:bg-white/5 hover:text-slate-200"><svg class="w-5 h-5 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 3v18h18"/><path d="M19 9l-7 7-4-4"/></svg><span class="text-sm">Performance</span></a>
      </nav>
      <div class="p-6 mt-auto"><a href="login.html" class="w-full flex items-center justify-center gap-2 px-4 py-3 text-xs font-bold uppercase tracking-wider text-red-400 hover:bg-red-500/10 rounded-2xl border border-transparent hover:border-red-500/20">Sign Out</a></div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 relative">
      <header class="h-20 border-b border-white/5 bg-[#020617]/60 backdrop-blur-xl flex items-center justify-between px-8 sticky top-0 z-30">
        <h2 class="text-2xl font-bold text-white">Weekly Schedule</h2>
        <button class="flex items-center gap-2 px-4 py-2 bg-cyan-600 hover:bg-cyan-500 text-white rounded-lg text-sm font-medium">+ Add Class</button>
      </header>

      <div class="flex-1 overflow-y-auto p-8">
        <div class="rounded-[2rem] border border-white/10 overflow-hidden p-0">
          <div class="min-w-[800px]">
            <div class="grid grid-cols-6 border-b border-white/10 bg-white/5 sticky top-0 z-10">
              <div class="p-4 text-slate-400 font-medium text-sm border-r border-white/10">Time</div>
              <div class="p-4 text-center text-slate-200 font-semibold border-r border-white/10">Mon</div>
              <div class="p-4 text-center text-slate-200 font-semibold border-r border-white/10">Tue</div>
              <div class="p-4 text-center text-slate-200 font-semibold border-r border-white/10">Wed</div>
              <div class="p-4 text-center text-slate-200 font-semibold border-r border-white/10">Thu</div>
              <div class="p-4 text-center text-slate-200 font-semibold">Fri</div>
            </div>
            <div class="divide-y divide-white/10">
              <!-- Static grid hours -->
              <!-- Repeat for times -->
              <!-- Example single row -->
              <div class="grid grid-cols-6 min-h-[100px]">
                <div class="p-4 text-slate-500 text-sm font-medium border-r border-white/10">09:00</div>
                <div class="p-2 border-r border-white/10"></div>
                <div class="p-2 border-r border-white/10"></div>
                <div class="p-2 border-r border-white/10"></div>
                <div class="p-2 border-r border-white/10"></div>
                <div class="p-2"></div>
              </div>
              <!-- Add more rows as needed -->
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
