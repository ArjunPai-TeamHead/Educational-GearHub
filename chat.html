<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <title>GEAR HUB — Collaboration</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>:root{--bg-primary:#020617;--text-primary:#F8FAFC}body{background:var(--bg-primary);color:var(--text-primary);font-family:Inter,sans-serif}</style>
</head>
<body>
  <div class="flex h-screen bg-[#313338] text-[#DBDEE1]">
    <div class="w-64 bg-[#2B2D31] flex flex-col">
      <div class="p-3 border-b border-[#1F2023]">
        <button class="w-full bg-[#1E1F22] text-[#949BA4] text-sm text-left px-2 py-1.5 rounded">Find or start a conversation</button>
      </div>
      <div class="flex-1 overflow-y-auto px-2 py-2">
        <div class="mt-4 mb-2 flex justify-between items-center px-2">
          <span class="text-xs font-bold text-[#949BA4] uppercase">Channels</span>
          <span class="text-[#949BA4]">+</span>
        </div>
        <div class="flex items-center gap-2 px-2 py-1.5 rounded cursor-pointer bg-[#404249] text-white">
          <span class="text-[#80848E]">#</span>
          <span class="font-medium truncate">general</span>
        </div>
        <div class="flex items-center gap-2 px-2 py-1.5 rounded cursor-pointer text-[#949BA4] hover:bg-[#35373C] hover:text-[#DBDEE1]">
          <span class="text-[#80848E]">#</span>
          <span class="font-medium truncate">homework-help</span>
        </div>
      </div>
      <div class="bg-[#232428] p-2 flex items-center gap-2">
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center text-white font-bold text-xs">SN</div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-semibold text-white truncate">Student Name</div>
          <div class="text-xs text-[#949BA4] truncate">#1234</div>
        </div>
        <button class="p-1.5 hover:bg-[#3F4147] rounded text-[#DBDEE1]">⚙️</button>
      </div>
    </div>

    <div class="flex-1 flex flex-col bg-[#313338]">
      <div class="h-12 border-b border-[#26272D] flex items-center px-4 justify-between">
        <div class="flex items-center">
          <span class="text-[#80848E] mr-2">#</span>
          <span class="font-bold text-white mr-4">general</span>
        </div>
        <div class="flex items-center gap-4 text-[#B5BAC1]">
          <button class="hover:text-white text-xs font-bold">Invite</button>
          <span>👥</span>
        </div>
      </div>
      <div class="flex-1 overflow-y-auto p-4 space-y-1">
        <div class="mt-10 px-4">
          <div class="w-16 h-16 rounded-full bg-[#41434A] flex items-center justify-center mb-4">#</div>
          <h1 class="text-3xl font-bold text-white mb-2">Welcome to #general!</h1>
          <p class="text-[#B5BAC1]">This is the start of the <span class="font-bold">#general</span> channel.</p>
        </div>
      </div>
      <div class="px-4 pb-6 pt-2">
        <div class="bg-[#383A40] rounded-lg px-4 py-2.5 flex items-center gap-3">
          <span class="text-[#B5BAC1]">＋</span>
          <input placeholder="Message #general" class="flex-1 bg-transparent text-[#DBDEE1] placeholder-[#949BA4] focus:outline-none">
          <span class="text-[#5865F2]">➤</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
